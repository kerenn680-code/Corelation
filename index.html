<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Kalkulator Korelasi Modern</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h1>📊 Kalkulator Korelasi Pearson</h1>
    <p>Masukkan data X dan Y (pisahkan dengan koma):</p>

    <div class="input-group">
      <label for="dataX">Data X:</label>
      <textarea id="dataX">2,3,4,5,6</textarea>
    </div>

    <div class="input-group">
      <label for="dataY">Data Y:</label>
      <textarea id="dataY">60,65,70,75,80</textarea>
    </div>

    <button onclick="hitungKorelasi()">⚡ Hitung Korelasi</button>

    <div id="hasil" class="result"></div>
  </div>

  <footer>
    <p>© 2026 Kalkulator Statistik | Desain Modern</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
